<!DOCTYPE html>
<html>
<head>
<title>Notes App</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>Notes App</h1>

<form action="/add" method="POST">
<input type="text" name="note" placeholder="Write a note">
<button type="submit">Add</button>
</form>

<ul>
{% for note in notes %}
<li>
{{ note.content }}
<a href="/delete/{{note.id}}">Delete</a>
</li>
{% endfor %}
</ul>

</body>
</html>
